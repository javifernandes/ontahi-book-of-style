      .subtitle{font:14px Inter,system-ui,sans-serif;fill:#B9C2AA}
      .label{font:15px Inter,system-ui,sans-serif;fill:#F6F2EB}
      .muted{font:12px Inter,system-ui,sans-serif;fill:#B9C2AA}
      .code{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#B9C2AA}
    </style>
  </defs>
  <rect width="960" height="330" rx="18" fill="#162018"/>

  <g transform="translate(140 44)">
