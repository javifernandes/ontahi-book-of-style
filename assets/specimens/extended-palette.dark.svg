<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330" role="img" aria-labelledby="title desc">
  <title id="title">Ontahi extended palette specimen</title>
  <desc id="desc">A clean tonal palette specimen showing Forest, Olive, Ceibo and Paper families across dark, base and light values.</desc>
  <defs>
    <style>
      .eyebrow{font:12px Inter,system-ui,sans-serif;letter-spacing:3px;fill:#B9C2AA}
