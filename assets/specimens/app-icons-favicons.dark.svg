<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Ontahi app icons and favicons</title>
  <desc id="desc">A focused specimen showing Ontahi app icon, favicon and social marker variants.</desc>
  <defs>
    <style>
      .eyebrow{font:12px Inter,system-ui,sans-serif;letter-spacing:3px;fill:#B9C2AA}
      .label{font:14px Inter,system-ui,sans-serif;fill:#F6F2EB}
      .caption{font:12px Inter,system-ui,sans-serif;fill:#B9C2AA}
    </style>
    <g id="ceibo" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M61 71c-7 13-9 25-4 38" stroke="var(--stem,#465538)" stroke-width="7"/>
      <path d="M56 84c-15-8-26-4-34 11 14 3 26-1 34-11Z" fill="var(--leaf,#7A7F52)"/>
      <path d="M63 77c14 0 24 7 30 21-15 0-25-7-30-21Z" fill="var(--leaf2,#98A16B)"/>
      <path d="M62 66c-18-2-31-12-38-29 19-1 32 9 38 29Z" fill="var(--petal,#D94C43)"/>
      <path d="M66 60c-9-17-8-34 3-49 13 15 12 32-3 49Z" fill="var(--petal2,#E06A61)"/>
      <path d="M72 62c8-16 22-24 40-24-6 18-19 27-40 24Z" fill="var(--petal,#D94C43)"/>
      <path d="M70 70c16 3 28 14 35 31-19 0-31-10-35-31Z" fill="var(--petal2,#E06A61)"/>
      <path d="M56 63c-15 8-30 8-45 0 12-13 28-13 45 0Z" fill="var(--petal,#D94C43)"/>
      <circle cx="64" cy="66" r="7" fill="var(--center,#F6F2EB)" stroke="var(--petal,#D94C43)" stroke-width="3"/>
    </g>
    <g id="microCeibo">
      <path d="M16 19c-3 5-4 9-2 14" fill="none" stroke="#98A16B" stroke-width="2.2" stroke-linecap="round"/>
      <ellipse cx="16" cy="13" rx="4" ry="10" fill="#E06A61"/>
      <ellipse cx="9" cy="17" rx="4" ry="9" fill="#D94C43" transform="rotate(-62 9 17)"/>
      <ellipse cx="23" cy="17" rx="4" ry="9" fill="#D94C43" transform="rotate(62 23 17)"/>
      <ellipse cx="12" cy="25" rx="3" ry="7" fill="#7A7F52" transform="rotate(64 12 25)"/>
      <circle cx="16" cy="19" r="2.4" fill="#F6F2EB" stroke="#E06A61" stroke-width="1.5"/>
    </g>
  </defs>
  <rect width="960" height="360" rx="18" fill="#162018"/>

  <g transform="translate(72 54)">
    <rect width="120" height="120" rx="26" fill="#162018"/>
    <g transform="translate(18 16) scale(.68)">
      <use href="#ceibo"/>
    </g>
  </g>
  <g transform="translate(246 54)">
    <rect width="120" height="120" rx="26" fill="#F6F2EB" stroke="#465538"/>
    <g transform="translate(18 16) scale(.68)">
      <use href="#ceibo"/>
    </g>
  </g>
  <g transform="translate(420 54)">
    <rect width="120" height="120" rx="26" fill="#D94C43"/>
    <g transform="translate(18 16) scale(.68)" style="--petal:#F6F2EB;--petal2:#E8E2D3;--leaf:#F6F2EB;--leaf2:#F6F2EB;--stem:#F6F2EB;--center:#D94C43">
      <use href="#ceibo"/>
    </g>
  </g>

  <g transform="translate(650 50)">
    <rect x="0" y="0" width="56" height="56" rx="12" fill="#F6F2EB" stroke="#465538"/>
    <g transform="translate(12 12)">
      <use href="#microCeibo"/>
    </g>
    <rect x="0" y="92" width="40" height="40" rx="9" fill="#F6F2EB" stroke="#465538"/>
    <g transform="translate(4 96)">
      <use href="#microCeibo"/>
    </g>
  </g>

  <g transform="translate(72 270)">
    <circle cx="24" cy="24" r="24" fill="#162018"/>
    <g transform="translate(8 8)">
      <use href="#microCeibo"/>
    </g>
  </g>
  <g transform="translate(470 270)">
    <rect width="48" height="48" rx="12" fill="#F6F2EB" stroke="#465538"/>
    <g transform="translate(8 8)">
      <use href="#microCeibo"/>
    </g>
  </g>
</svg>
