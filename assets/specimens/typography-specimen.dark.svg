<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" role="img" aria-labelledby="title desc">
  <title id="title">Ontahi typography roles</title>
  <desc id="desc">A compact typography specimen showing heading, body, caption and code roles.</desc>
  <defs>
    <style>
      .eyebrow{font:12px Inter,system-ui,sans-serif;letter-spacing:3px;fill:#B9C2AA}
      .role{font:13px Inter,system-ui,sans-serif;fill:#B9C2AA}
      .serif{font-family:Georgia,serif;fill:#F6F2EB}
      .sans{font-family:Inter,system-ui,sans-serif;fill:#F6F2EB}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#F6F2EB}
    </style>
  </defs>
  <rect width="760" height="250" rx="16" fill="#162018"/>

  <g transform="translate(40 54)">
    <text x="0" y="42" class="serif" font-size="32">Executable ontology</text>
  </g>

  <g transform="translate(40 136)">
    <text x="0" y="30" class="sans" font-size="16">Long passages should stay calm and unambiguous.</text>
  </g>

  <g transform="translate(470 54)">
    <rect x="0" y="18" width="250" height="78" rx="10" fill="#1F2A24" stroke="#465538"/>
    <text x="20" y="50" class="mono" font-size="14">task.define({</text>
    <text x="40" y="74" class="mono" font-size="14">durable: true</text>
    <text x="20" y="98" class="mono" font-size="14">})</text>
  </g>

  <g transform="translate(470 186)">
    <text x="0" y="24" class="sans" font-size="13" fill="#B9C2AA">Name the figure, not the decoration.</text>
  </g>
</svg>
