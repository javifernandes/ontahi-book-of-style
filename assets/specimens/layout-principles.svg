<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Ontahi layout principles</title>
  <desc id="desc">A layout specimen showing editorial margins, asymmetry, hierarchy and white space for Ontahi documents.</desc>
  <defs>
    <style>
      .eyebrow{font:12px Inter,system-ui,sans-serif;letter-spacing:3px;fill:#465538}
      .label{font:14px Inter,system-ui,sans-serif;fill:#465538}
      .title{font:36px Georgia,serif;fill:#162018}
      .body{font:15px Georgia,serif;fill:#162018}
    </style>
  </defs>
  <rect width="960" height="520" rx="18" fill="#F6F2EB"/>
  <text x="56" y="54" class="eyebrow">LAYOUT</text>
  <text x="56" y="94" class="title">Editorial, asymmetric, breathable</text>
  <rect x="72" y="132" width="360" height="300" rx="12" fill="#FFFCF6" stroke="#D9D1C0"/>
  <rect x="112" y="170" width="194" height="18" rx="4" fill="#162018"/>
  <rect x="112" y="210" width="244" height="7" rx="3.5" fill="#C2B7A4"/>
  <rect x="112" y="232" width="220" height="7" rx="3.5" fill="#D9D1C0"/>
  <rect x="112" y="254" width="252" height="7" rx="3.5" fill="#D9D1C0"/>
  <rect x="112" y="298" width="150" height="74" rx="8" fill="#E8E2D3"/>
  <rect x="284" y="298" width="84" height="74" rx="8" fill="#F6F2EB" stroke="#D9D1C0"/>
  <path d="M92 132v300M392 132v300" stroke="#E8E2D3" stroke-dasharray="6 6"/>
  <text x="72" y="462" class="label">Book spread: margins are part of the composition.</text>

  <g transform="translate(522 136)">
    <rect width="342" height="88" rx="12" fill="#162018"/>
    <text x="26" y="36" font-family="Georgia,serif" font-size="26" fill="#F6F2EB">Hierarchy first</text>
    <text x="26" y="62" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#C2B7A4">One dominant idea per view.</text>
    <rect y="122" width="214" height="88" rx="12" fill="#E8E2D3"/>
    <text x="24" y="157" class="body">Rhythm</text>
    <path d="M24 178h150M24 195h118" stroke="#C2B7A4" stroke-width="6" stroke-linecap="round"/>
    <rect x="238" y="122" width="104" height="88" rx="12" fill="#F6F2EB" stroke="#D9D1C0"/>
    <circle cx="290" cy="166" r="24" fill="#D94C43"/>
    <text x="0" y="258" class="label">Asymmetry prevents dashboard monotony.</text>
    <text x="0" y="288" class="label">White space is not empty; it carries attention.</text>
  </g>
</svg>
