<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Ontahi botanical pattern seeds</title>
  <desc id="desc">A specimen sheet showing clean outline, dense and light ceibo pattern directions.</desc>
  <defs>
    <style>
      .eyebrow{font:15px Inter,system-ui,sans-serif;letter-spacing:4px;fill:#B9C2AA}
      .title{font:48px Georgia,serif;fill:#F6F2EB}
      .label{font:20px Inter,system-ui,sans-serif;fill:#F6F2EB}
      .caption{font:14px Inter,system-ui,sans-serif;fill:#B9C2AA}
    </style>
    <g id="sprig" fill="none" stroke="#C2B7A4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 118C46 82 82 54 128 34"/>
      <path d="M46 82C30 75 20 62 17 45C35 48 47 63 46 82Z"/>
      <path d="M72 61C68 43 74 26 88 14C96 32 91 50 72 61Z"/>
      <path d="M94 48C110 36 128 32 146 38C134 53 116 58 94 48Z"/>
      <path d="M38 98C24 100 13 109 6 122C22 123 35 114 38 98Z"/>
    </g>
    <clipPath id="outline-card"><rect x="70" y="60" width="300" height="250" rx="14"/></clipPath>
    <clipPath id="dense-card"><rect x="450" y="60" width="300" height="250" rx="14"/></clipPath>
    <clipPath id="light-card"><rect x="830" y="60" width="300" height="250" rx="14"/></clipPath>
  </defs>
  <rect width="1200" height="360" rx="18" fill="#162018"/>

  <rect x="70" y="60" width="300" height="250" rx="14" fill="#1F2A24" stroke="#465538"/>
  <g clip-path="url(#outline-card)" opacity=".7">
    <use href="#sprig" x="120" y="116"/>
    <use href="#sprig" x="190" y="150" transform="rotate(-14 254 210)"/>
  </g>
  <rect x="450" y="60" width="300" height="250" rx="14" fill="#1F2A24" stroke="#465538"/>
  <g clip-path="url(#dense-card)" opacity=".52">
    <use href="#sprig" x="486" y="96"/>
    <use href="#sprig" x="560" y="142" transform="rotate(-10 624 202)"/>
    <use href="#sprig" x="506" y="204" transform="rotate(8 570 264)"/>
  </g>
  <rect x="830" y="60" width="300" height="250" rx="14" fill="#1F2A24" stroke="#465538"/>
  <g clip-path="url(#light-card)" opacity=".34">
    <use href="#sprig" x="902" y="126"/>
    <use href="#sprig" x="980" y="182" transform="rotate(-12 1044 242)"/>
  </g>
</svg>
