      .word{font:64px Georgia,serif;fill:#F6F2EB}
      .smallword{font:36px Georgia,serif;fill:#F6F2EB}
    </style>
    <g id="ceibo" fill="none" stroke-linecap="round" stroke-linejoin="round">
