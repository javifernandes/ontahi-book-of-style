<svg xmlns="http://www.w3.org/2000/svg" width="960" height="510" viewBox="0 0 960 510" role="img" aria-labelledby="title desc">
  <title id="title">Ontahi logo system specimen</title>
  <desc id="desc">A focused specimen showing the Ontahi primary lockup, symbol variants, wordmark and negative use.</desc>
  <defs>
    <style>
