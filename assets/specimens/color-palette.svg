<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Ontahi color palette specimen</title>
  <desc id="desc">A palette specimen showing core Ontahi colors, extended tonal families, usage ratio and dark mode surfaces.</desc>
  <defs>
    <style>
      .label{font:14px Inter,system-ui,sans-serif;fill:#162018}
      .eyebrow{font:12px Inter,system-ui,sans-serif;letter-spacing:3px;fill:#465538}
      .small{font:12px Inter,system-ui,sans-serif;fill:#465538}
      .code{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#162018}
      .title{font:36px Georgia,serif;fill:#162018}
    </style>
  </defs>
  <rect width="960" height="420" rx="18" fill="#F6F2EB"/>
  <path d="M40 92h880M40 300h880" stroke="#D9D1C0"/>
  <text x="40" y="46" class="eyebrow">COLOR PALETTE</text>
  <text x="40" y="78" class="title">Forest, paper, ceibo</text>

  <g transform="translate(40 122)">
    <g>
      <rect width="112" height="72" rx="10" fill="#162018"/>
      <text x="0" y="96" class="label">Forest Dark</text>
      <text x="0" y="116" class="code">#162018</text>
    </g>
    <g transform="translate(132 0)">
      <rect width="112" height="72" rx="10" fill="#1F2A24"/>
      <text x="0" y="96" class="label">Forest</text>
      <text x="0" y="116" class="code">#1F2A24</text>
    </g>
    <g transform="translate(264 0)">
      <rect width="112" height="72" rx="10" fill="#7A7F52"/>
      <text x="0" y="96" class="label">Olive</text>
      <text x="0" y="116" class="code">#7A7F52</text>
    </g>
    <g transform="translate(396 0)">
      <rect width="112" height="72" rx="10" fill="#D94C43"/>
      <text x="0" y="96" class="label">Ceibo</text>
      <text x="0" y="116" class="code">#D94C43</text>
    </g>
    <g transform="translate(528 0)">
      <rect width="112" height="72" rx="10" fill="#E8E2D3" stroke="#D9D1C0"/>
      <text x="0" y="96" class="label">Warm Paper</text>
      <text x="0" y="116" class="code">#E8E2D3</text>
    </g>
    <g transform="translate(660 0)">
      <rect width="112" height="72" rx="10" fill="#F6F2EB" stroke="#D9D1C0"/>
      <text x="0" y="96" class="label">Paper</text>
      <text x="0" y="116" class="code">#F6F2EB</text>
    </g>
  </g>

  <g transform="translate(40 326)">
    <text x="0" y="-10" class="eyebrow">USAGE RATIO</text>
    <rect width="352" height="38" rx="8" fill="#E8E2D3"/>
    <rect width="352" height="38" rx="8" fill="#F6F2EB" stroke="#D9D1C0"/>
    <rect x="352" width="66" height="38" fill="#7A7F52"/>
    <rect x="418" width="22" height="38" rx="0" fill="#D94C43"/>
    <text x="0" y="66" class="small">80% paper and neutrals</text>
    <text x="262" y="66" class="small">15% greens</text>
    <text x="392" y="66" class="small">5% ceibo</text>
  </g>

  <g transform="translate(560 314)">
    <rect width="360" height="78" rx="12" fill="#162018"/>
    <circle cx="42" cy="39" r="12" fill="#D94C43"/>
    <text x="72" y="34" font-family="Georgia,serif" font-size="26" fill="#F6F2EB">Dark mode is forest</text>
    <text x="72" y="58" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#C2B7A4">Never generic black. Keep botanical depth.</text>
  </g>
</svg>
